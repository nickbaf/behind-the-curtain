<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Behind the Curtain</title>
    <meta name="description" content="Opera and ballet stories, reimagined. One night only." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- SVG filters for fabric texture -->
    <svg class="svg-defs" aria-hidden="true">
      <defs>
        <!-- Velvet pile grain — organic noise blended into fabric -->
        <filter id="velvetGrain" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.65 1.1" numOctaves="5" seed="3" result="noise" />
          <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
          <feComponentTransfer in="mono" result="softNoise">
            <feFuncA type="linear" slope="0.12" intercept="0" />
          </feComponentTransfer>
          <feBlend in="SourceGraphic" in2="softNoise" mode="multiply" />
        </filter>

        <!-- Subtle vertical thread lines -->
        <filter id="threadLines" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="turbulence" baseFrequency="0.01 0.6" numOctaves="2" seed="7" result="threads" />
          <feColorMatrix in="threads" type="saturate" values="0" result="monoThreads" />
          <feComponentTransfer in="monoThreads" result="softThreads">
            <feFuncA type="linear" slope="0.06" intercept="0" />
          </feComponentTransfer>
          <feBlend in="SourceGraphic" in2="softThreads" mode="overlay" />
        </filter>
      </defs>
    </svg>

    <!-- ═══════════════════════════════════════ STAGE ══════════ -->
    <div class="stage" id="stage" aria-label="Concert invite">

      <div class="spotlights">
        <div class="spotlight spotlight--left"></div>
        <div class="spotlight spotlight--center"></div>
        <div class="spotlight spotlight--right"></div>
      </div>

      <div class="particles" id="particles"></div>

      <div class="invite" id="invite" aria-live="polite">
        <div class="invite__inner">

          <p class="invite__eyebrow">Opera and ballet stories, reimagined</p>

          <h1 class="invite__title">
            <span class="invite__title-line">Behind</span>
            <span class="invite__title-line invite__title-line--italic">the</span>
            <span class="invite__title-line">Curtain</span>
          </h1>

          <div class="invite__featuring">
            <p class="invite__featuring-name">Sam Ching</p>
            <p class="invite__featuring-role">Violinist</p>
            <p class="invite__featuring-name">Russell Woo</p>
            <p class="invite__featuring-role">Pianist</p>
          </div>

          <div class="invite__details">
            <div class="invite__detail">
              <span class="invite__detail-label">Date &amp; Time</span>
              <span class="invite__detail-value">April 25th &mdash; 7:00 PM</span>
            </div>
            <div class="invite__detail">
              <span class="invite__detail-label">Venue</span>
              <span class="invite__detail-value">9508 Borgata Bay Blvd</span>
            </div>
          </div>

          <a href="mailto:russell@russellwoo.com" class="invite__cta" aria-label="RSVP via email">
            RSVP
          </a>

        </div>
      </div>

    </div>

    <!-- ═══════════════════════════════════════ CURTAIN ═══════ -->
    <div class="curtain-wrap" id="curtainWrap">

      <div class="curtain-rod" aria-hidden="true">
        <div class="curtain-rod__bar"></div>
        <div class="curtain-rod__rings"></div>
        <div class="curtain-rod__finial curtain-rod__finial--left"></div>
        <div class="curtain-rod__finial curtain-rod__finial--right"></div>
      </div>

      <!-- Left panel -->
      <div class="curtain curtain--left" id="curtainLeft" role="button" tabindex="0" aria-label="Click to peek">
        <!-- Fabric pleats — wide strips with bilateral shading -->
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <!-- Velvet grain overlay -->
        <div class="curtain__grain" aria-hidden="true"></div>
        <!-- Shimmer layer (nap direction) -->
        <div class="curtain__shimmer" aria-hidden="true"></div>
        <!-- Bottom weight / pooling shadow -->
        <div class="curtain__weight" aria-hidden="true"></div>
        <!-- Inner edge trim -->
        <div class="curtain__tassel" aria-hidden="true"></div>
      </div>

      <!-- Right panel -->
      <div class="curtain curtain--right" id="curtainRight" role="button" tabindex="0" aria-label="Click to peek">
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__fold"></div>
        <div class="curtain__grain" aria-hidden="true"></div>
        <div class="curtain__shimmer" aria-hidden="true"></div>
        <div class="curtain__weight" aria-hidden="true"></div>
        <div class="curtain__tassel" aria-hidden="true"></div>
      </div>

      <!-- Hint -->
      <div class="hint" id="hint" aria-hidden="true">
        <div class="hint__icon">👆</div>
        <p class="hint__text" id="hintText">Click to peek inside</p>
      </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
