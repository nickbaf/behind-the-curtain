<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Behind the Curtain</title>
    <meta name="description" content="Opera and ballet stories, reimagined. One night only." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ═══════════════════════════════════════ STAGE ══════════ -->
    <div class="stage" id="stage" aria-label="Concert invite">

      <div class="spotlights">
        <div class="spotlight spotlight--left"></div>
        <div class="spotlight spotlight--center"></div>
        <div class="spotlight spotlight--right"></div>
      </div>

      <div class="bokeh" id="bokeh"></div>
      <div class="particles" id="particles"></div>

      <div class="invite" id="invite" aria-live="polite">
        <div class="invite__inner">

          <h1 class="invite__title">
            <span class="invite__title-line">Behind</span>
            <span class="invite__title-line invite__title-line--italic">the</span>
            <span class="invite__title-line">Curtain</span>
          </h1>

          <p class="invite__subtitle">Opera and ballet stories, reimagined</p>

          <div class="invite__featuring">
            <p class="invite__featuring-name">Sam Ching</p>
            <p class="invite__featuring-role">Violinist</p>
            <p class="invite__featuring-name">Russell Woo</p>
            <p class="invite__featuring-role">Pianist</p>
          </div>

          <div class="invite__details">
            <div class="invite__detail">
              <span class="invite__detail-label">Date &amp; Time</span>
              <span class="invite__detail-value">April 25th &mdash; 7:00 PM</span>
            </div>
            <div class="invite__detail">
              <span class="invite__detail-label">Venue</span>
              <span class="invite__detail-value">9508 Borgata Bay Blvd</span>
            </div>
          </div>

          <a href="mailto:russell@russellwoo.com" class="invite__cta" aria-label="RSVP via email">
            RSVP
          </a>

        </div>
      </div>

    </div>

    <!-- ═══════════════════════════════════════ CURTAIN ═══════ -->
    <div class="curtain-wrap" id="curtainWrap">

      <div class="curtain-rod" aria-hidden="true">
        <div class="curtain-rod__bar"></div>
        <div class="curtain-rod__rings"></div>
        <div class="curtain-rod__finial curtain-rod__finial--left"></div>
        <div class="curtain-rod__finial curtain-rod__finial--right"></div>
      </div>

      <!-- Hint -->
      <div class="hint" id="hint" aria-hidden="true">
        <div class="hint__icon">👆</div>
        <p class="hint__text" id="hintText">Click to reveal</p>
      </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="assets/three.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
